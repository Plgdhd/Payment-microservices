jwt:
  access-expiration-sec: 50000
  refresh-expiration-sec: ${REFRESH_EXPIRATION_SEC:86400}
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true


spring:
  application:
    name: auth-service

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:auth-postgres}:${DB_PORT:5432}/${DB_NAME:auth_service}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:auth_password}
    driver-class-name: org.postgresql.Driver

internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET}
server:
  port: 8082

