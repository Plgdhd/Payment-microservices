server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: order-service

  config:
    activate:
      on-profile: prod


  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

    consumer:
      group-id: ${spring.application.name}-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true

  datasource:
    # Теперь URL гибок и берется из Docker Compose
    url: jdbc:postgresql://${DB_HOST:order-postgres}:${DB_PORT:5432}/${DB_NAME:order_service}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:order_password}
    driver-class-name: org.postgresql.Driver

user:
  service:
    url: ${USER_SERVICE_URL:http://user-service:8081/api/users}

resilience4j:
  circuitbreaker:
    instances:
      userService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:
      userService:
        maxAttempts: 3
        waitDuration: 500ms

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true