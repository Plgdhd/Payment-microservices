server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: order-service

  config:
    activate:
      on-profile: prod

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

    consumer:
      group-id: ${spring.application.name}-group-v2
      auto-offset-reset: earliest

      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true

        spring.json.type.mapping: "payment_created:com.plgdhd.orderservice.event.PaymentCreatedEvent,
         com.plgdhd.paymentservice.event.PaymentCreatedEvent:com.plgdhd.orderservice.event.PaymentCreatedEvent"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring.json.type.mapping: "com.plgdhd.orderservice.event.OrderCreatedEvent:order_created"

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:order-postgres}:${DB_PORT:5432}/${DB_NAME:order_service}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:order_password}
    driver-class-name: org.postgresql.Driver

user:
  service:
    url: ${USER_SERVICE_URL:http://user-service:8081/api/users}

resilience4j:
  circuitbreaker:
    instances:
      userService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:
      userService:
        maxAttempts: 3
        waitDuration: 500ms

internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true