name: Payment Microservices CI/CD

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  user-service-test:
    name: Build & Test User Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Build & Test with JaCoCo
        run: mvn -B clean verify

      - name: Upload User Service JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: user-jacoco-report
          path: user-service/target/site/jacoco/jacoco.xml

order-service-test:
  name: Build & Test Order Service
  runs-on: ubuntu-latest

  defaults:
    run:
      working-directory: order-service

  steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: maven

    - name: Enable Docker access
      run: |
        sudo systemctl start docker
        docker info

    - name: Build & Test with JaCoCo
      run: mvn -B clean verify

    - name: Upload Order Service JaCoCo Report
      uses: actions/upload-artifact@v4
      with:
        name: order-jacoco-report
        path: order-service/target/site/jacoco/jacoco.xml


  sonarqube:
    needs: [user-service-test, order-service-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven

      - name: Download JaCoCo Reports
        uses: actions/download-artifact@v4
        with:
          path: reports

      - name: Move JaCoCo reports to correct location
        run: |
          mkdir -p user-service/target/site/jacoco
          mkdir -p order-service/target/site/jacoco
          cp reports/user-jacoco-report/jacoco.xml user-service/target/site/jacoco/ || echo "User report not found"
          cp reports/order-jacoco-report/jacoco.xml order-service/target/site/jacoco/ || echo "Order report not found"

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=Plgdhd_Payment-microservices \
            -Dsonar.organization=plgdhd \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.coverage.jacoco.xmlReportPaths=user-service/target/site/jacoco/jacoco.xml,order-service/target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=user-service/target/classes,order-service/target/classes