spring:
  application:
    name: user-service
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate

  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  datasource:
    url: jdbc:postgresql://${DB_HOST:user-postgres}:${DB_PORT:5432}/${DB_NAME:user_service}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:user_password}
    driver-class-name: org.postgresql.Driver


logging:
  level:
    com.plgdhd: INFO
    org.springframework: WARN

validity_period_of_card: 10
jwt:
  secret: ${JWT_SECRET}
server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
