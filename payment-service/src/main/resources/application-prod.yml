server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: payment-service

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/paymentdb}
      database: paymentdb

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

    consumer:
      group-id: ${spring.application.name}-group-v2
      auto-offset-reset: earliest

      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: true

        spring.json.type.mapping: "order_created:com.plgdhd.paymentservice.event.OrderCreatedEvent,
           com.plgdhd.orderservice.event.OrderCreatedEvent:com.plgdhd.paymentservice.event.OrderCreatedEvent"

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring.json.type.mapping: "com.plgdhd.paymentservice.event.PaymentCreatedEvent:payment_created"

external:
  random:
    api:
      url: ${RANDOM_API_URL:https://www.randomnumberapi.com}

mongock:
  migration-scan-package: com.plgdhd.paymentservice.migration
  enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    com.plgdhd.paymentservice: INFO
    org.springframework: INFO