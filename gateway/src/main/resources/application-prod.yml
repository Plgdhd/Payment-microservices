server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**, /internal/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /api/cards/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: lb:payment-service
          predicates:
            - Path=/api/payments/**
services:
  auth-service: auth-service
  user-service: user-service

internal:
  service:
    secret: ${INTERNAL_SERVICE_SECRET}
jwt:
  secret: ${JWT_SECRET}
