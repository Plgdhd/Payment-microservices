server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://authentication-service:8082
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**, /api/cards/**

        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**

#        - id: payment-service
#          uri: http://payment-service:8084
#          predicates:
#            - Path=/api/payments/**
services:
  auth-url: http://authentication-service:8082
  user-url: http://user-service:8081


jwt:
  secret: ${JWT_SECRET}
